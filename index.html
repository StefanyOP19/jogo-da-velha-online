<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jogo da velha online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>jogo da velha online</h1>
    <p class="subtitle">Jogue contra a máquina — divertido e rápido.</p>

    <div id="game">
      <div id="board" aria-label="tabuleiro"></div>
      <div id="status" class="status">Sua vez</div>
      <div class="controls">
        <button id="restart">Reiniciar</button>
        <button id="newgame">Novo jogo (máquina começa)</button>
      </div>
    </div>
    <footer class="credits">Tema: azul e laranja • IA: Minimax</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
